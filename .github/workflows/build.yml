name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Ubuntu desktop build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Build web shell
        run: npm run build

      - name: Build desktop bundles
        run: npm run tauri:build

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-build-${{ matrix.platform }}
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: error

  arch-package:
    runs-on: ubuntu-latest
    container: archlinux:base-devel

    steps:
      - name: Install Arch packaging dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            nodejs \
            npm \
            rustup \
            webkit2gtk-4.1 \
            gtk3 \
            libayatana-appindicator \
            librsvg \
            patchelf

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        run: rustup default stable

      - name: Run Arch packaging tests
        run: |
          npm ci
          npm test -- scripts/__tests__/arch-package.test.ts
          npm run typecheck
          cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build desktop binary for Arch package
        run: npm run tauri:build -- --bundles none

      - name: Build Arch package
        run: |
          npm run package:arch:metadata
          npm run package:arch

      - name: Upload Arch package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-build-archlinux
          path: |
            packaging/arch/PKGBUILD
            packaging/arch/.SRCINFO
            packaging/arch/out/dist/*
          if-no-files-found: error
