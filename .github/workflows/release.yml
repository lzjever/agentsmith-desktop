name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Ubuntu desktop build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Run release gates
        run: |
          npm test
          npm run typecheck
          npm run build

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Create draft GitHub release and upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AgentSmith Desktop ${{ github.ref_name }}'
          releaseBody: |
            Internal pilot desktop release.

            See:
            - docs/internal-pilot-runbook.md
            - docs/platform-prerequisites.md
            - docs/release-checklist.md
          releaseDraft: true
          prerelease: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-checksums
          if command -v sha256sum >/dev/null 2>&1; then
            hash_cmd=(sha256sum)
          else
            hash_cmd=(shasum -a 256)
          fi
          while IFS= read -r -d '' file; do
            "${hash_cmd[@]}" "$file" >> release-checksums/SHA256SUMS.txt
          done < <(find src-tauri/target/release/bundle -type f -print0 | sort -z)

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.platform }}
          path: release-checksums/SHA256SUMS.txt
          if-no-files-found: error

  arch-package:
    runs-on: ubuntu-latest
    needs: release
    container: archlinux:base-devel

    steps:
      - name: Install Arch packaging dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            github-cli \
            nodejs \
            npm \
            rustup \
            webkit2gtk-4.1 \
            gtk3 \
            libayatana-appindicator \
            librsvg \
            patchelf

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        run: rustup default stable

      - name: Prepare Arch package build user
        run: |
          id -u builder >/dev/null 2>&1 || useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          chown -R builder:builder /github/home
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop binary for Arch package
        run: |
          npm run build
          cargo build --manifest-path src-tauri/Cargo.toml --release

      - name: Build Arch package
        run: |
          su builder -c "cd \"$GITHUB_WORKSPACE\" && npm run package:arch:metadata && npm run package:arch"

      - name: Upload Arch package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-archlinux
          path: |
            packaging/arch/PKGBUILD
            packaging/arch/.SRCINFO
            packaging/arch/out/dist/*
          if-no-files-found: error

      - name: Upload Arch package to draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            packaging/arch/out/dist/* \
            packaging/arch/PKGBUILD \
            packaging/arch/.SRCINFO \
            --repo "${{ github.repository }}" \
            --clobber
