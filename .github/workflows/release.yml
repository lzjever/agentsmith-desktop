name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Ubuntu desktop build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Run release gates
        run: |
          npm test
          npm run typecheck
          npm run build

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Create draft GitHub release and upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AgentSmith Desktop ${{ github.ref_name }}'
          releaseBody: |
            Internal pilot desktop release.

            See:
            - docs/internal-pilot-runbook.md
            - docs/platform-prerequisites.md
            - docs/release-checklist.md
          releaseDraft: true
          prerelease: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          mkdir -p release-checksums
          for file in src-tauri/target/release/bundle/**/*; do
            if [[ -f "$file" ]]; then
              sha256sum "$file" >> release-checksums/SHA256SUMS.txt
            fi
          done

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.platform }}
          path: release-checksums/SHA256SUMS.txt
          if-no-files-found: error
